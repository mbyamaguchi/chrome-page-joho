<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 350px;
            padding: 15px;
            font-family: sans-serif;
            color: #333;
        }

        h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #0056b3;
        }

        .info-box {
            word-wrap: break-word;
            /* 長いURLを折り返す */
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <h3>ページのタイトル:</h3>
    <div id="page-title" class="info-box">情報を取得しています...</div>
    <h3>ページのURL:</h3>
    <div id="page-url" class="info-box">情報を取得しています...</div>

    <script src="popup.js"></script>
</body>
</body>

</html>
